name: Fetch Raw Crossref Response

on:
  workflow_dispatch:
    inputs:
      doi:
        description: 'مقاله DOI'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch raw response from Crossref
        run: |
          mkdir -p results
          DOI=$(echo "${{ github.event.inputs.doi }}" | grep -oP '10\.\d{4,}/[^\s\"<>|]+' | head -1)
          echo "Cleaned DOI: $DOI"
          curl -s -o "results/$DOI.json" \
            -H "User-Agent: OmidPaperBot/1.0 (mailto:omidh20202@gmail.com)" \
            "https://api.crossref.org/works/$DOI"
          echo "Raw response saved to results/$DOI.json"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "Add raw response for ${{ github.event.inputs.doi }}" || echo "No changes"
          git push
