name: Fetch Article Info

on:
  workflow_dispatch:
    inputs:
      doi:
        description: 'مقاله DOI (اختیاری)'
        required: false
      query:
        description: 'کلیدواژه جستجو (اختیاری)'
        required: false
      filename:
        description: 'نام فایل خروجی (بدون مسیر)'
        required: true
        default: 'result'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and extract data
        run: |
          FILENAME="${{ github.event.inputs.filename }}.json"
          if [ -n "${{ github.event.inputs.doi }}" ]; then
            INPUT="${{ github.event.inputs.doi }}"
            curl -s -o tmp.json \
              -H "User-Agent: OmidPaperBot/1.0 (mailto:omidh20202@gmail.com)" \
              "https://api.crossref.org/works/${INPUT}"
            python3 -c "
          import json
          with open('tmp.json') as f:
              data = json.load(f)
          msg = data['message']
          result = {
              'title': msg.get('title', ['N/A'])[0],
              'author': [f\"{a.get('given','')} {a.get('family','')}\".strip() for a in msg.get('author', [])],
              'year': msg.get('created', {}).get('date-parts', [[None]])[0][0],
              'journal': msg.get('container-title', ['N/A'])[0],
              'doi': msg.get('DOI', 'N/A')
          }
          with open('${FILENAME}', 'w') as out:
              json.dump(result, out, ensure_ascii=False)
          "
          elif [ -n "${{ github.event.inputs.query }}" ]; then
            QUERY="${{ github.event.inputs.query }}"
            curl -s -G -o tmp.json \
              -H "User-Agent: OmidPaperBot/1.0 (mailto:omidh20202@gmail.com)" \
              --data-urlencode "query=${QUERY}" \
              --data-urlencode "rows=1" \
              "https://api.crossref.org/works"
            python3 -c "
          import json
          with open('tmp.json') as f:
              data = json.load(f)
          item = data['message']['items'][0]
          result = {
              'title': item.get('title', ['N/A'])[0],
              'author': [f\"{a.get('given','')} {a.get('family','')}\".strip() for a in item.get('author', [])],
              'year': item.get('created', {}).get('date-parts', [[None]])[0][0],
              'journal': item.get('container-title', ['N/A'])[0],
              'doi': item.get('DOI', 'N/A')
          }
          with open('${FILENAME}', 'w') as out:
              json.dump(result, out, ensure_ascii=False)
          "
          else
            echo "No input provided."
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "*.json"
          git commit -m "Add ${{ github.event.inputs.filename }}" || echo "No changes"
          git push
