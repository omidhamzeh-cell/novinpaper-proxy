name: Fetch Raw Crossref Response

on:
  workflow_dispatch:
    inputs:
      doi:
        description: 'مقاله DOI'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch raw response from Crossref
        run: |
          mkdir -p results
          DOI="10.1016/j.clnu.2020.12.022"
          SAFE_NAME=$(echo "$DOI" | tr '/' '_')
          echo "Saving as: results/${SAFE_NAME}.json"
          curl -s -o "results/${SAFE_NAME}.json" \
            -H "User-Agent: OmidPaperBot/1.0 (mailto:omidh20202@gmail.com)" \
            "https://api.crossref.org/works/${DOI}"
          echo "Raw response saved."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "Add raw response for ${{ github.event.inputs.doi }}" || echo "No changes"
          git push
