name: Fetch Article Info

on:
  workflow_dispatch:
    inputs:
      doi:
        description: 'مقاله DOI'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # اجازه نوشتن در مخزن
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get metadata from CrossRef
        run: |
          mkdir -p results
          DOI="${{ github.event.inputs.doi }}"
          curl -s -H "User-Agent: OmidPaperBot/1.0 (mailto:omidh20202@gmail.com)" \
            "https://api.crossref.org/works/${DOI}" > tmp.json
          # استفاده از python3 برای استخراج فیلدها (بدون نیاز به نصب)
          python3 -c "
          import json, sys
          with open('tmp.json') as f:
              data = json.load(f)
          msg = data['message']
          result = {
              'title': msg.get('title', ['N/A'])[0],
              'author': [f\"{a.get('given','')} {a.get('family','')}\".strip() for a in msg.get('author', [])],
              'year': msg.get('created', {}).get('date-parts', [[None]])[0][0],
              'journal': msg.get('container-title', ['N/A'])[0],
              'publisher': msg.get('publisher', 'N/A'),
              'doi': msg.get('DOI', '$DOI'),
              'abstract': msg.get('abstract', 'N/A')
          }
          with open('results/${DOI}.json', 'w') as out:
              json.dump(result, out, ensure_ascii=False)
          "

      - name: Commit and push result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "Add result for ${{ github.event.inputs.doi }}" || echo "No changes"
          git push
