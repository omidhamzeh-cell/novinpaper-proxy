name: Fetch Article Info

on:
  workflow_dispatch:
    inputs:
      doi:
        description: 'مقاله DOI (اختیاری)'
        required: false
      query:
        description: 'کلیدواژه جستجو (اختیاری)'
        required: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and extract article data
        run: |
          mkdir -p results
          if [ -n "${{ github.event.inputs.doi }}" ]; then
            DOI="${{ github.event.inputs.doi }}"
            SAFE_NAME=$(echo "$DOI" | tr '/' '_')
            curl -s -o tmp.json \
              -H "User-Agent: OmidPaperBot/1.0 (mailto:omidh20202@gmail.com)" \
              "https://api.crossref.org/works/${DOI}"
            # فقط فیلدهای ضروری را بیرون بکشیم (عنوان، نویسنده، سال، ژورنال، DOI)
            jq '{
              title: .message.title[0],
              author: [.message.author[]? | "\(.given) \(.family)"],
              year: .message.created."date-parts"[0][0],
              journal: .message."container-title"[0],
              doi: .DOI
            }' tmp.json > "results/${SAFE_NAME}.json"
          elif [ -n "${{ github.event.inputs.query }}" ]; then
            QUERY="${{ github.event.inputs.query }}"
            SAFE_NAME=$(echo "$QUERY" | tr ' /' '_')
            curl -s -o tmp.json \
              -H "User-Agent: OmidPaperBot/1.0 (mailto:omidh20202@gmail.com)" \
              "https://api.crossref.org/works?query=${QUERY}&rows=1"
            jq '{
              title: .message.items[0].title[0],
              author: [.message.items[0].author[]? | "\(.given) \(.family)"],
              year: .message.items[0].created."date-parts"[0][0],
              journal: .message.items[0]."container-title"[0],
              doi: .message.items[0].DOI
            }' tmp.json > "results/${SAFE_NAME}.json"
          else
            echo "No input provided."
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "Update result" || echo "No changes"
          git push
